name: Deploy static preview to GitHub Pages

# Builds the site in static mode (no server, no mail API) and publishes it to
# GitHub Pages so it can be reviewed at:
#   https://sh4rkkk.github.io/dakrenovatie-website-gradus/
#
# Runs on every push to main, and can be triggered by hand from the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deploy at a time; cancel an in-progress run if a newer push lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build (static)
        run: npm run build
        env:
          STATIC_BUILD: "true"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
